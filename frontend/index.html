<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transcripción de Audio Pro</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="container">
        <h1>Transcripción Inteligente</h1>

        <div class="controls">
            <!-- Custom File Upload Button -->
            <label for="audioInput" class="btn btn-primary">
                <i class="ph ph-upload-simple"></i>
                Elegir Archivos
            </label>
            <input type="file" id="audioInput" accept="audio/*" multiple />

            <!-- Microphone Button -->
            <button id="micBtn" class="btn btn-record">
                <i class="ph ph-microphone"></i>
                <span id="micText">Grabar Audio</span>
            </button>
        </div>

        <!-- Dynamic Results Area -->
        <div id="resultsArea" class="results-area"></div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/transcribe";

        // Confidence configuration
        const CONFIDENCE = { HIGH: 0.9, MEDIUM: 0.75, LOW: 0.5 };

        // State
        let mediaRecorder;
        let audioChunks = [];

        // --- Event Listeners ---

        // File Selection
        document.getElementById("audioInput").addEventListener("change", async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            // Process each file individually to show progressive results
            files.forEach(file => processFile(file));

            // Reset input so same files can be selected again if needed
            e.target.value = "";
        });

        // Microphone Logic
        const micBtn = document.getElementById("micBtn");
        const micText = document.getElementById("micText");

        micBtn.addEventListener("click", async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                stopRecording();
            } else {
                startRecording();
            }
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.start();
                micBtn.classList.add("recording");
                micText.textContent = "Detener (Grabando...)";

                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: "audio/webm" });
                    // Create a dummy file from the blob
                    const file = new File([blob], `mic_recording_${Date.now()}.webm`, { type: "audio/webm" });
                    processFile(file);
                };
            } catch (err) {
                alert("Error al acceder al micrófono: " + err.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder) {
                mediaRecorder.stop();
                micBtn.classList.remove("recording");
                micText.textContent = "Grabar Audio";
            }
        }

        // --- Processing Logic ---

        async function processFile(file) {
            // Create UI Element (Accordion Item)
            const id = "item-" + Math.random().toString(36).substr(2, 9);
            const item = createAccordionItem(id, file.name);
            document.getElementById("resultsArea").prepend(item.element); // Add new at top

            // Prepare FormData
            const formData = new FormData();
            formData.append("files", file); // API expects 'files' list

            try {
                const resp = await fetch(API_URL, {
                    method: "POST",
                    body: formData
                });

                if (!resp.ok) throw new Error("Error " + resp.status);

                const data = await resp.json();

                // The API returns { transcriptions: [ { filename, result: { text, words }, error } ] }
                // Since we send one file at a time here, we take the first result.
                const transcriptionData = data.transcriptions[0];

                if (transcriptionData.error) {
                    throw new Error(transcriptionData.error);
                }

                // Render Success
                updateAccordionSuccess(item, transcriptionData.result.words);

            } catch (err) {
                updateAccordionError(item, err.message);
            }
        }

        // --- UI Helper Functions ---

        function createAccordionItem(id, filename) {
            const div = document.createElement("div");
            div.className = "accordion-item";
            div.id = id;

            div.innerHTML = `
                <div class="accordion-header" onclick="toggleAccordion('${id}')">
                    <div class="file-info">
                        <i class="ph ph-file-audio icon"></i>
                        <span>${filename}</span>
                    </div>
                    <div class="status-badge processing">
                        <span class="spinner"></span> Procesando...
                    </div>
                </div>
                <div class="accordion-content">
                    <div class="transcription-text">Espere, transcribiendo...</div>
                </div>
            `;

            return { element: div, id: id };
        }

        function toggleAccordion(id) {
            const item = document.getElementById(id);
            const content = item.querySelector(".accordion-content");
            content.classList.toggle("open");
        }

        function updateAccordionSuccess(itemObj, words) {
            const item = document.getElementById(itemObj.id);
            if (!item) return;

            // Update Badge
            const badge = item.querySelector(".status-badge");
            badge.className = "status-badge done";
            badge.innerHTML = `<i class="ph ph-check-circle"></i> Completado`;

            // Update Content
            const contentDiv = item.querySelector(".transcription-text");
            contentDiv.innerHTML = ""; // clear loading text

            if (!words || words.length === 0) {
                contentDiv.textContent = "[Sin voz detectada]";
                return;
            }

            words.forEach(w => {
                const span = document.createElement("span");
                span.textContent = w.word + " ";
                span.className = "word " + getConfidenceClass(w.confidence);

                // Add tooltip for exact % if needed
                span.title = `Confianza: ${(w.confidence * 100).toFixed(1)}%`;

                contentDiv.appendChild(span);
            });

            // Auto-open upon completion
            toggleAccordion(itemObj.id);
        }

        function updateAccordionError(itemObj, msg) {
            const item = document.getElementById(itemObj.id);
            if (!item) return;

            const badge = item.querySelector(".status-badge");
            badge.className = "status-badge error";
            badge.innerHTML = `<i class="ph ph-warning-circle"></i> Error`;

            const contentDiv = item.querySelector(".transcription-text");
            contentDiv.innerHTML = `<span style="color: var(--conf-bad)">${msg}</span>`;

            toggleAccordion(itemObj.id);
        }

        function getConfidenceClass(score) {
            if (score >= CONFIDENCE.HIGH) return "high";
            if (score >= CONFIDENCE.MEDIUM) return "medium";
            if (score >= CONFIDENCE.LOW) return "low";
            return "bad";
        }
    </script>
</body>

</html>
